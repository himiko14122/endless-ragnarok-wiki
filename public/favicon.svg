<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="blade-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a3d7a"/>
      <stop offset="50%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#00c8ff"/>
    </linearGradient>
    <linearGradient id="hilt-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#d4a800"/>
    </linearGradient>
    <linearGradient id="wing-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f1b3d"/>
      <stop offset="40%" style="stop-color:#1a2d5e"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
  </defs>
  <!-- Circular emblem background -->
  <circle cx="256" cy="256" r="240" fill="#0d0d2b" stroke="#2a2a4e" stroke-width="4"/>
  <!-- Wing (right side, dynamic arc) -->
  <path d="M 220 280 Q 280 140 400 100 Q 360 200 300 260 Q 260 300 220 280 Z" fill="url(#wing-grad)" opacity="0.9"/>
  <path d="M 230 270 Q 270 170 370 130 Q 340 210 290 250 Q 250 280 230 270 Z" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.5"/>
  <!-- Sword (vertical, centered slightly left) -->
  <rect x="178" y="110" width="16" height="200" rx="4" fill="url(#blade-grad)"/>
  <rect x="170" y="108" width="32" height="12" rx="3" fill="url(#hilt-grad)"/>
  <!-- Sword guard (crossguard) -->
  <rect x="150" y="310" width="72" height="10" rx="3" fill="url(#hilt-grad)"/>
  <!-- Sword grip -->
  <rect x="176" y="320" width="20" height="60" rx="3" fill="url(#hilt-grad)"/>
  <!-- Sword pommel -->
  <circle cx="186" cy="390" r="12" fill="url(#hilt-grad)"/>
  <!-- Glow effect -->
  <circle cx="186" cy="200" r="30" fill="url(#blade-grad)" opacity="0.15"/>
</svg>
